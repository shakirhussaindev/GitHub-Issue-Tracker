<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind + Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <nav>
      <div class="w-11/12 mx-auto py-6 flex justify-between">
        <div class="flex items-center gap-1">
          <img class="w-[36px]" src="./assets/github-logo.png" alt="" />
          <h1 class="text-2xl font-semibold text-[#1F2937]">
            GitHub Issues Tracker
          </h1>
        </div>
        <div class="flex gap-4">
          <label class="input">
            <svg
              class="h-[1em] opacity-50"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input type="search" required placeholder="Search issues..." />
          </label>
          <button class="btn btn-primary">
            <span class="text-2xl">+</span> New Issue
          </button>
        </div>
      </div>
    </nav>

    <main class="w-9/12 mx-auto">
      <section class="p-6 rounded-lg mt-15 mb-4 section">
        <button id="allBtn" class="btn btn-primary py-3 px-[50px] font-semibold">All</button>
        <button id="openBtn" class="btn btn-soft py-3 px-[38px] font-semibold">Open</button>
        <button id="closeBtn" class="btn btn-soft py-3 px-[33px] font-semibold">Closed</button>
      </section>

      <section class="p-6 rounded-lg flex justify-between items-center section">
        <div class="flex gap-2">
          <img src="./assets/Aperture.png" alt="" />
          <div>
            <h2 class="text-xl font-semibold">50 Issues</h2>
            <p class="text-[#64748B]">Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex gap-4">
          <div class="flex gap-2 items-center">
            <span class="w-3 h-3 bg-green-500 rounded-full inline-block"></span>
            <p class="text-[#1F2937] font-medium">Open</p>
          </div>
          <div class="flex gap-2 items-center">
            <span
              class="w-3 h-3 bg-purple-500 rounded-full inline-block"
            ></span>
            <p class="text-[#1F2937] font-medium">Closed</p>
          </div>
        </div>
      </section>

      <section id="cards"
        class="p-6 rounded-lg section mt-0.5 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3"
